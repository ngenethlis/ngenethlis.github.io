name: Update last-watched film

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:          # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: letterboxd-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest watched film
        run: python3 scripts/update_letterboxd.py ngene

      - name: Commit if changed
        run: |
          if git diff --quiet -- letterboxd-last.json; then
            echo "No change in last-watched film."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add letterboxd-last.json
          git commit -m "Update last-watched film from Letterboxd"
          git push
